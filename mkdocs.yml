site_name: salma Documentation
use_directory_urls: false

validation:
  links:
    not_found: info
site_description: C++ mod installer with FOMOD support
site_author: lextpf

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections

    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - def_list
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home:
    - index.md
  - API Reference:
    - Core:
      - Core/index.md
      - Logger: Logger/index.md
      - ArchiveService: ArchiveService/index.md
      - FileOperations: FileOperations/index.md
      - ModStructureDetector: ModStructureDetector/index.md
    - FOMOD:
      - FOMOD/index.md
      - FomodService: FomodService/index.md
      - FomodDependencyEvaluator: FomodDependencyEvaluator/index.md
      - FomodInferenceService: FomodInferenceService/index.md
    - Installation:
      - Installation/index.md
      - InstallationService: InstallationService/index.md
      - CApi: CApi/index.md
    - Server:
      - Server/index.md
      - InstallationController: InstallationController/index.md
      - MultipartHandler: MultipartHandler/index.md
      - StaticFileHandler: StaticFileHandler/index.md
      - ConfigService: ConfigService/index.md
      - Mo2Controller: Mo2Controller/index.md
