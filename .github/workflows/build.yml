name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static-md

    steps:
      - uses: actions/checkout@v4

      - name: Check formatting (clang-format)
        run: |
          $targets = @()
          $targets += Get-ChildItem -Path src   -Include *.cpp,*.hpp -Recurse -File -ErrorAction SilentlyContinue
          $targets += Get-ChildItem -Path tests -Include *.cpp,*.hpp -Recurse -File -ErrorAction SilentlyContinue
          foreach ($f in $targets) {
            Write-Host "Formatting $($f.FullName)"
            clang-format -i $f.FullName
          }
          $diff = git diff --name-only
          if ($diff) {
            Write-Host "::error::The following files need formatting:"
            Write-Host $diff
            exit 1
          }
          Write-Host "All files are properly formatted."
        shell: pwsh

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "05442024c3fda64320bd25d2251cc9807b84fb6f"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build web dashboard
        run: |
          cd web
          npm ci
          npm run build
        shell: pwsh

      - name: Acquire 7z.dll for bundling
        run: |
          $url = "https://www.7-zip.org/a/7z2408-x64.exe"
          Invoke-WebRequest -Uri $url -OutFile 7z-installer.exe
          # Silent install into a local directory so we can pick up 7z.dll
          # without polluting the runner's Program Files.
          New-Item -ItemType Directory -Force -Path 7z | Out-Null
          Start-Process -FilePath .\7z-installer.exe -ArgumentList "/S","/D=$pwd\7z" -Wait
          $dll = Resolve-Path "$pwd\7z\7z.dll"
          "SALMA_7Z_DLL=$dll" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        shell: pwsh

      - name: Configure
        run: cmake --preset ci-release -DSALMA_7Z_DLL="$env:SALMA_7Z_DLL"
        shell: pwsh

      - name: Build
        run: cmake --build --preset ci-release

      - name: Package
        run: |
          cmake --install build --config Release --prefix dist/staging
          cd build
          cpack -G ZIP -C Release
        shell: pwsh

      # Surface the produced binaries directly so reviewers can grab the DLL
      # or server EXE without unpacking the release zip. Uses absolute paths
      # so the artifact archive is flat (one file per entry, no nested
      # build/bin/Release/ directory).
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: salma-mo2-binaries
          path: |
            build/bin/Release/mo2-salma.dll
            build/bin/Release/mo2-server.exe
            build/bin/Release/salma_tests.exe
          if-no-files-found: error
          retention-days: 14

      # Debug symbols are nice to have for crash-dump triage but get expensive
      # to retain long-term. Keep them, but with a shorter retention.
      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: salma-mo2-pdb
          path: |
            build/bin/Release/mo2-salma.pdb
            build/bin/Release/mo2-server.pdb
          if-no-files-found: warn
          retention-days: 7

      # The release bundle is the packaging output (cpack ZIP). Kept separate
      # from the raw binaries so consumers can pick whichever they need.
      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: salma-mo2-release-bundle
          path: build/salma-mo2-*.zip
          if-no-files-found: error
          retention-days: 30
