name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: windows-latest

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static-md

    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "05442024c3fda64320bd25d2251cc9807b84fb6f"

      - name: Configure CMake
        run: cmake --preset default

      - name: Build tests
        run: cmake --build build --config Release --target salma_tests

      - name: Run tests
        run: |
          cd build
          ctest -C Release --output-on-failure
